          AWS, Azure, NCP 클라우드 운영 | EKS 기반 미디어 플랫폼 서비스 운영
        description: | # this will include new lines to allow paragraphs
            - On-prem to Public Cloud 마이그레이션
            - 모니터링 및 알람 시스템 도입 및 고도화 (CloudWatch, Azure Monitoring & Lambda, Slack & promethus, grafana)
            - EKS 구축 표준 수립 (Terraform, Script, Helm)
            - 클라우드 비용 최적화 (S3 비용절감, VPC Traffic 개선)
