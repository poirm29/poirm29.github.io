about_content: | # this will include new lines to allow paragraphs
  AWS, Azure, NCP 등 다양한 클라우드 플랫폼에서 인프라 운영 및 구축 업무를 수행해온 8년차 클라우드 엔지니어 입니다.
  11개의 EKS 멀티클러스터 환경으로 구성된 고객포털 서비스의 인프라 운영, EKS 구축 표준 설계, 운영 고도화 및 자동화 등의 업무를 수행 해왔습니다.
  
  Cisco, Fortinet, Juniper 등 하드웨어 네트워크/보안 장비를 다루었던 필드엔지니어로 지냈던 경험이 있으며
  하이브리드 클라우드 환경의 VPN, 전용선, 라우팅, 방화벽 의 운영 및 트러블슈팅에 능숙합니다. 
  클라우드 Managed Service 뿐만 아니라 전용선 구간 네트워크 장비(Extreme Switch) 나 방화벽(SRX, Vyatta) 장비를 운영하기도 했습니다.
  
  최근에는 EKS 환경 운영 및 구축, CI/CD 파이프라인 고도화 등의 프로젝트를 수행했으며 팀의 DevOps 역량 강화를 위한 교육 및 내부 프로젝트를 리딩하고 있습니다.
  

