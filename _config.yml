about_content: |
  AWS, Azure, NCP, IBM 등 다양한 CSP의 고객 서비스 구축 및 운영, 마이그레이션 업무를 수행해온 7년차 클라우드 엔지니어입니다.
  이슈에 대한 근본 원인을 찾고 트러블슈팅 하는 것을 좋아하며, 인프라 레이어의 구축, 운영 및 고도화 경험이 풍부합니다.

  Cisco, Fortinet, Juniper 등 하드웨어 네트워크/보안 장비를 다루었던 필드엔지니어 경험을 바탕으로,
  하이브리드 클라우드 환경의 VPN, 전용선, 라우팅, 방화벽 운영 및 트러블슈팅에 능숙합니다.

  최근에는 EKS 환경 운영 및 구축, CI/CD 파이프라인 고도화 등의 프로젝트를 수행했으며,
  팀의 DevOps 역량 강화를 위한 교육 및 내부 프로젝트를 리딩하고 있습니다.

  새로운 기술과 지식에 대한 끊임없는 관심과 함께, 근본적인 CS 지식 기반과 경험을 더해 올바른 판단을 내릴 수 있는 인사이트를 중요하게 여깁니다.

